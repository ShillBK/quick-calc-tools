<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zodiac Compatibility – Love Match</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Zodiac Compatibility</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-purple-600">🌟 Check Zodiac Love Compatibility</h2>

      <form id="zodiacForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-lg font-medium mb-2">Your Zodiac Sign</label>
            <select id="sign1" class="w-full p-4 border border-gray-300 rounded-lg text-xl focus:ring-purple-500 focus:border-purple-500">
              <option value="Aries">Aries (Mar 21 – Apr 19)</option>
              <option value="Taurus">Taurus (Apr 20 – May 20)</option>
              <option value="Gemini">Gemini (May 21 – Jun 20)</option>
              <option value="Cancer">Cancer (Jun 21 – Jul 22)</option>
              <option value="Leo">Leo (Jul 23 – Aug 22)</option>
              <option value="Virgo">Virgo (Aug 23 – Sep 22)</option>
              <option value="Libra" selected>Libra (Sep 23 – Oct 22)</option>
              <option value="Scorpio">Scorpio (Oct 23 – Nov 21)</option>
              <option value="Sagittarius">Sagittarius (Nov 22 – Dec 21)</option>
              <option value="Capricorn">Capricorn (Dec 22 – Jan 19)</option>
              <option value="Aquarius">Aquarius (Jan 20 – Feb 18)</option>
              <option value="Pisces">Pisces (Feb 19 – Mar 20)</option>
            </select>
          </div>

          <div>
            <label class="block text-lg font-medium mb-2">Partner's Zodiac Sign</label>
            <select id="sign2" class="w-full p-4 border border-gray-300 rounded-lg text-xl focus:ring-purple-500 focus:border-purple-500">
              <option value="Aries">Aries</option>
              <option value="Taurus">Taurus</option>
              <!-- ... same options as above ... -->
              <option value="Pisces" selected>Pisces</option>
            </select>
          </div>
        </div>

        <button type="button" onclick="checkZodiac()" class="w-full bg-purple-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-purple-700 transition">
          Check Compatibility
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-purple-50 border border-purple-200 rounded-xl p-8 text-center">
        <h3 class="text-4xl font-extrabold text-purple-700 mb-6" id="percent"></h3>
        <p class="text-2xl font-medium text-gray-800 mb-4" id="title"></p>
        <p class="text-lg text-gray-700 leading-relaxed" id="desc"></p>
      </div>
    </div>
  </main>

  <script>
    function checkZodiac() {
      const sign1 = document.getElementById('sign1').value;
      const sign2 = document.getElementById('sign2').value;

      if (!sign1 || !sign2) return;

      // Simple compatibility map (approximate popular astrology views)
      const compat = {
        "Aries": { "Leo": {p:92, t:"Fiery & Passionate"}, "Sagittarius": {p:88, t:"Adventure Buddies"}, "Gemini": {p:75, t:"Exciting but Clashing"} },
        "Taurus": { "Virgo": {p:90, t:"Stable & Loyal"}, "Capricorn": {p:85, t:"Practical Power Couple"}, "Cancer": {p:80, t:"Comfort & Security"} },
        // ... (shortened – you can expand or use a full matrix)
        "Libra": { "Gemini": {p:90, t:"Social Butterflies"}, "Aquarius": {p:85, t:"Intellectual Harmony"}, "Leo": {p:78, t:"Romantic Drama"} },
        "Pisces": { "Scorpio": {p:95, t:"Deep Soul Connection"}, "Cancer": {p:92, t:"Emotional Sanctuary"}, "Taurus": {p:80, t:"Dreamy & Grounded"} }
        // Add more pairs as needed – default fallback
      };

      let percent = 50 + Math.floor(Math.random() * 30);
      let title = "Moderate Match";
      let desc = "There's potential, but effort is needed to make it work.";

      if (compat[sign1] && compat[sign1][sign2]) {
        percent = compat[sign1][sign2].p;
        title = compat[sign1][sign2].t;
        desc = `Astrology says you two have ${percent}% compatibility. ${title}.`;
      } else if (compat[sign2] && compat[sign2][sign1]) {
        percent = compat[sign2][sign1].p;
        title = compat[sign2][sign1].t;
        desc = `Astrology says you two have ${percent}% compatibility. ${title}.`;
      }

      document.getElementById('percent').textContent = `${percent}%`;
      document.getElementById('title').textContent = title;
      document.getElementById('desc').textContent = desc;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
