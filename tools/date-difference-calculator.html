<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Date Difference Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Date Difference Calculator</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-gray-700">Days / Months / Years Between Dates</h2>

      <form id="dateForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-lg font-medium mb-2">From Date</label>
            <input type="date" id="date1" class="w-full p-4 border border-gray-300 rounded-lg text-xl focus:ring-gray-500 focus:border-gray-500" required />
          </div>
          <div>
            <label class="block text-lg font-medium mb-2">To Date</label>
            <input type="date" id="date2" class="w-full p-4 border border-gray-300 rounded-lg text-xl focus:ring-gray-500 focus:border-gray-500" required />
          </div>
        </div>

        <button type="button" onclick="calculateDateDiff()" class="w-full bg-gray-700 text-white py-4 rounded-lg text-xl font-bold hover:bg-gray-800 transition">
          Calculate Difference
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-gray-100 border border-gray-300 rounded-xl p-8 text-center">
        <h3 class="text-4xl font-extrabold text-gray-800 mb-6" id="totalDays"></h3>
        <p class="text-xl mb-4" id="breakdown"></p>
        <p class="text-lg" id="exact"></p>
      </div>
    </div>
  </main>

  <script>
    function calculateDateDiff() {
      const d1 = new Date(document.getElementById('date1').value);
      const d2 = new Date(document.getElementById('date2').value);

      if (isNaN(d1) || isNaN(d2)) {
        alert("Please select both dates");
        return;
      }

      if (d1 > d2) {
        alert("From date should be earlier than To date");
        return;
      }

      const diffMs = d2 - d1;
      const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));

      let years = d2.getFullYear() - d1.getFullYear();
      let months = d2.getMonth() - d1.getMonth();
      let dayDiff = d2.getDate() - d1.getDate();

      if (dayDiff < 0) {
        months--;
        const lastDayPrevMonth = new Date(d2.getFullYear(), d2.getMonth(), 0).getDate();
        dayDiff += lastDayPrevMonth;
      }
      if (months < 0) {
        years--;
        months += 12;
      }

      document.getElementById('totalDays').textContent = `${days.toLocaleString('en-IN')} days`;
      document.getElementById('breakdown').textContent = `${years} years, ${months} months, ${dayDiff} days`;
      document.getElementById('exact').textContent = `From ${d1.toDateString()} to ${d2.toDateString()}`;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
