<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salary Take-Home Calculator – India 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Salary Take-Home / In-Hand Pay</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-green-700">Estimate Monthly Net Salary</h2>

      <form id="salaryForm" class="space-y-6">
        <div>
          <label class="block text-lg font-medium mb-2">Gross Monthly Salary (₹)</label>
          <input type="number" id="gross" value="80000" min="10000" step="1000" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" required />
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Basic Salary % of Gross (usually 40-50%)</label>
          <input type="number" id="basicPct" value="50" min="30" max="70" step="1" class="w-full p-3 border border-gray-300 rounded-lg" required />
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Other Allowances (HRA, etc.)</label>
          <input type="number" id="allowances" value="20000" min="0" step="1000" class="w-full p-3 border border-gray-300 rounded-lg" />
        </div>

        <button type="button" onclick="calculateTakeHome()" class="w-full bg-green-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-green-700 transition">
          Calculate Net Pay
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-green-50 border border-green-200 rounded-xl p-6">
        <h3 class="text-2xl font-bold text-green-800 mb-4">Monthly Take-Home Estimate</h3>
        <p id="deductions" class="text-xl mb-3"></p>
        <p id="netPay" class="text-xl mb-3"></p>
        <p id="annualCTC" class="text-xl"></p>
      </div>

      <div class="mt-8 text-sm text-gray-600">
        <p><strong>Assumptions (2026 India approx.):</strong> 12% PF (employee), Professional Tax ₹200/month, basic TDS slab. Not exact – use for rough idea only.</p>
      </div>
    </div>
  </main>

  <script>
    function calculateTakeHome() {
      const gross = parseFloat(document.getElementById('gross').value);
      const basicPct = parseFloat(document.getElementById('basicPct').value) / 100;
      const allowances = parseFloat(document.getElementById('allowances').value) || 0;

      if (isNaN(gross) || gross < 10000 || isNaN(basicPct) || basicPct < 0.3) {
        alert("Enter valid gross salary and basic %");
        return;
      }

      const basic = gross * basicPct;
      const pf = basic * 0.12; // Employee PF
      const pt = 200; // Approx Karnataka PT
      const taxable = gross - pf - allowances; // Simplified
      let tds = 0;
      if (taxable * 12 > 700000) tds = (taxable * 0.05) / 12; // Rough old regime slab

      const deductions = pf + pt + tds;
      const net = gross - deductions;

      document.getElementById('deductions').innerHTML = `<strong>Total Deductions (approx.):</strong> ₹${Math.round(deductions).toLocaleString('en-IN')} (PF + PT + TDS)`;
      document.getElementById('netPay').innerHTML = `<strong>Monthly In-Hand:</strong> ₹${Math.round(net).toLocaleString('en-IN')}`;
      document.getElementById('annualCTC').innerHTML = `<strong>Approx. Annual CTC:</strong> ₹${Math.round(gross * 12).toLocaleString('en-IN')}`;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
