<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EMI / Loan Calculator – Bengaluru 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">EMI Calculator</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-green-700">Calculate Your EMI</h2>
      <form id="emiForm" class="space-y-6">
        <div>
          <label class="block text-lg font-medium mb-2">Loan Amount (₹)</label>
          <input type="number" id="principal" value="500000" min="10000" step="1000" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" required />
        </div>
        <div>
          <label class="block text-lg font-medium mb-2">Annual Interest Rate (%)</label>
          <input type="number" id="rate" value="9.5" min="1" max="30" step="0.1" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" required />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-lg font-medium mb-2">Tenure</label>
            <input type="number" id="tenure" value="5" min="1" max="30" step="1" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" required />
          </div>
          <div class="flex items-end">
            <select id="tenureUnit" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
              <option value="years">Years</option>
              <option value="months">Months</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-lg font-medium mb-2">Processing Fee (optional, % or fixed ₹)</label>
          <div class="flex gap-3">
            <input type="number" id="feePercent" placeholder="% (e.g. 1)" step="0.1" class="w-1/2 p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" />
            <input type="number" id="feeFixed" placeholder="Fixed ₹" step="100" class="w-1/2 p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" />
          </div>
          <p class="text-sm text-gray-500 mt-1">Typical in 2026: Home ~0.5–1%, Personal/Car ~1–3%</p>
        </div>

        <button type="button" onclick="calculateEMI()" class="w-full bg-green-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-green-700 transition">
          Calculate EMI
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-green-50 border border-green-200 rounded-xl p-6">
        <h3 class="text-2xl font-bold text-green-800 mb-4">Your Loan Summary</h3>
        <p id="emi" class="text-2xl font-bold mb-3"></p>
        <p id="totalPayable" class="text-xl mb-2"></p>
        <p id="totalInterest" class="text-xl mb-2"></p>
        <p id="processingFee" class="text-xl mb-2"></p>
        <p id="note" class="text-sm text-gray-600 mt-4 italic">Note: This uses reducing balance EMI formula (most common in India). Actual may vary slightly by bank policy.</p>
      </div>
    </div>
  </main>

  <script>
    function calculateEMI() {
      const principal = parseFloat(document.getElementById('principal').value);
      let annualRate = parseFloat(document.getElementById('rate').value);
      let tenure = parseFloat(document.getElementById('tenure').value);
      const tenureUnit = document.getElementById('tenureUnit').value;
      const feePercent = parseFloat(document.getElementById('feePercent').value) || 0;
      const feeFixed = parseFloat(document.getElementById('feeFixed').value) || 0;

      if (isNaN(principal) || principal <= 0 || isNaN(annualRate) || annualRate <= 0 || isNaN(tenure) || tenure <= 0) {
        alert("Please enter valid positive values for amount, rate, and tenure.");
        return;
      }

      // Convert to months
      const months = tenureUnit === 'years' ? tenure * 12 : tenure;
      const monthlyRate = annualRate / 12 / 100;

      // EMI formula: P * r * (1+r)^n / ((1+r)^n - 1)
      const emi = principal * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1);

      const totalPayable = emi * months;
      const totalInterest = totalPayable - principal;

      // Processing fee
      let processingFee = feeFixed;
      if (feePercent > 0) {
        processingFee += (feePercent / 100) * principal;
      }
      const totalWithFee = totalPayable + processingFee;

      document.getElementById('emi').innerHTML = `<strong>Monthly EMI:</strong> ₹${Math.round(emi).toLocaleString('en-IN')}`;
      document.getElementById('totalPayable').innerHTML = `<strong>Total Amount Payable (excl. fee):</strong> ₹${Math.round(totalPayable).toLocaleString('en-IN')}`;
      document.getElementById('totalInterest').innerHTML = `<strong>Total Interest:</strong> ₹${Math.round(totalInterest).toLocaleString('en-IN')}`;
      if (processingFee > 0) {
        document.getElementById('processingFee').innerHTML = `<strong>Processing Fee:</strong> ₹${Math.round(processingFee).toLocaleString('en-IN')} (added to total: ₹${Math.round(totalWithFee).toLocaleString('en-IN')})`;
      } else {
        document.getElementById('processingFee').innerHTML = '';
      }

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru March 2026</p>
  </footer>
</body>
</html>
