<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPA / Percentage Calculator – India</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">GPA / Percentage Calculator</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-cyan-700">Convert Marks to GPA & Percentage</h2>

      <form id="gpaForm" class="space-y-6">
        <div>
          <label class="block text-lg font-medium mb-2">Total Marks Obtained</label>
          <input type="number" id="obtained" value="450" min="0" step="1" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-cyan-500 focus:border-cyan-500" required />
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Maximum Marks</label>
          <input type="number" id="max" value="500" min="1" step="1" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-cyan-500 focus:border-cyan-500" required />
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Grading System</label>
          <select id="system" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-cyan-500 focus:border-cyan-500">
            <option value="10">10-point GPA (most universities)</option>
            <option value="4">4.0 GPA scale (international/US style)</option>
            <option value="percent">Percentage only</option>
          </select>
        </div>

        <button type="button" onclick="calculateGPA()" class="w-full bg-cyan-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-cyan-700 transition">
          Calculate GPA / Percentage
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-cyan-50 border border-cyan-200 rounded-xl p-6">
        <h3 class="text-2xl font-bold text-cyan-800 mb-4">Results</h3>
        <p id="percentage" class="text-xl mb-3"></p>
        <p id="gpa" class="text-xl mb-3"></p>
        <p id="grade" class="text-lg"></p>
      </div>
    </div>
  </main>

  <script>
    function calculateGPA() {
      const obtained = parseFloat(document.getElementById('obtained').value);
      const max = parseFloat(document.getElementById('max').value);
      const system = document.getElementById('system').value;

      if (isNaN(obtained) || isNaN(max) || obtained < 0 || max <= 0 || obtained > max) {
        alert("Please enter valid marks (obtained ≤ maximum)");
        return;
      }

      const percent = (obtained / max) * 100;
      let gpa = 0;
      let grade = "";

      if (system === "10") {
        gpa = (percent / 9.5).toFixed(2); // common Indian conversion
        grade = percent >= 90 ? "Outstanding (O)" : percent >= 80 ? "Excellent (A+)" : percent >= 70 ? "Very Good (A)" : percent >= 60 ? "Good (B+)" : percent >= 50 ? "Average (B)" : "Needs Improvement";
      } else if (system === "4") {
        gpa = (percent / 25).toFixed(2); // rough 4.0 scale
        grade = percent >= 90 ? "A+" : percent >= 80 ? "A" : percent >= 70 ? "B+" : percent >= 60 ? "B" : percent >= 50 ? "C" : "D/F";
      } else {
        gpa = null;
        grade = "";
      }

      document.getElementById('percentage').innerHTML = `<strong>Percentage:</strong> ${percent.toFixed(2)}%`;
      document.getElementById('gpa').innerHTML = gpa ? `<strong>GPA:</strong> ${gpa} / ${system === "10" ? "10" : "4.0"}` : "";
      document.getElementById('grade').innerHTML = grade ? `<strong>Grade:</strong> ${grade}` : "";

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
