<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice Total Calculator – With GST & Discount</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Invoice Total Calculator</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-teal-700">Create Quick Invoice Total</h2>

      <form id="invoiceForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-lg font-medium mb-2">GST Rate (%)</label>
            <select id="gstRate" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500">
              <option value="18">18% (most services)</option>
              <option value="12">12%</option>
              <option value="5">5%</option>
              <option value="0">0% (exempt)</option>
              <option value="custom">Custom</option>
            </select>
            <input type="number" id="customGst" step="0.1" placeholder="Custom GST %" class="w-full p-3 mt-2 border border-gray-300 rounded-lg hidden focus:ring-teal-500 focus:border-teal-500" />
          </div>

          <div>
            <label class="block text-lg font-medium mb-2">Discount (% or ₹)</label>
            <input type="number" id="discount" value="0" min="0" step="0.01" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500" />
            <select id="discountType" class="w-full p-3 mt-2 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500">
              <option value="percent">%</option>
              <option value="amount">₹ fixed</option>
            </select>
          </div>

          <div>
            <label class="block text-lg font-medium mb-2">Round Off</label>
            <select id="roundOff" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500">
              <option value="no">No rounding</option>
              <option value="nearest">Nearest rupee</option>
            </select>
          </div>
        </div>

        <div id="itemsContainer" class="space-y-4">
          <div class="item-row grid grid-cols-12 gap-3 items-end">
            <div class="col-span-5">
              <label class="block text-sm font-medium mb-1">Description</label>
              <input type="text" class="desc w-full p-2 border border-gray-300 rounded" value="Service / Product" />
            </div>
            <div class="col-span-2">
              <label class="block text-sm font-medium mb-1">Qty</label>
              <input type="number" class="qty w-full p-2 border border-gray-300 rounded text-center" value="1" min="1" />
            </div>
            <div class="col-span-3">
              <label class="block text-sm font-medium mb-1">Rate (₹)</label>
              <input type="number" class="rate w-full p-2 border border-gray-300 rounded text-right" value="1000" step="0.01" />
            </div>
            <div class="col-span-2 text-right">
              <label class="block text-sm font-medium mb-1">Amount</label>
              <div class="amount text-xl font-semibold text-teal-700">₹1,000</div>
            </div>
          </div>
        </div>

        <button type="button" onclick="addItemRow()" class="bg-teal-100 text-teal-700 px-6 py-2 rounded hover:bg-teal-200">
          + Add Another Item
        </button>

        <button type="button" onclick="calculateInvoice()" class="w-full bg-teal-600 text-white py-4 rounded-lg text-xl font-bold hover:bg-teal-700 transition mt-6">
          Calculate Invoice Total
        </button>
      </form>

      <div id="invoiceResult" class="mt-10 hidden bg-teal-50 border border-teal-200 rounded-xl p-6">
        <h3 class="text-2xl font-bold text-teal-800 mb-6 text-center">Invoice Summary</h3>
        <div class="grid grid-cols-2 gap-4 text-lg">
          <div class="font-medium">Subtotal (before GST & discount):</div>
          <div class="text-right font-semibold" id="subtotal"></div>

          <div class="font-medium">Discount Applied:</div>
          <div class="text-right text-red-600 font-semibold" id="discountAmt"></div>

          <div class="font-medium">Taxable Amount:</div>
          <div class="text-right" id="taxable"></div>

          <div class="font-medium">GST Amount:</div>
          <div class="text-right text-green-700 font-semibold" id="gstAmt"></div>

          <div class="text-xl font-bold border-t pt-4 mt-4">Grand Total:</div>
          <div class="text-xl font-bold text-right border-t pt-4 mt-4 text-teal-800" id="grandTotal"></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function addItemRow() {
      const container = document.getElementById('itemsContainer');
      const row = document.createElement('div');
      row.className = 'item-row grid grid-cols-12 gap-3 items-end';
      row.innerHTML = `
        <div class="col-span-5">
          <input type="text" class="desc w-full p-2 border border-gray-300 rounded" value="Item / Service" />
        </div>
        <div class="col-span-2">
          <input type="number" class="qty w-full p-2 border border-gray-300 rounded text-center" value="1" min="1" />
        </div>
        <div class="col-span-3">
          <input type="number" class="rate w-full p-2 border border-gray-300 rounded text-right" value="0" step="0.01" />
        </div>
        <div class="col-span-2 text-right">
          <div class="amount text-xl font-semibold text-teal-700">₹0</div>
        </div>
      `;
      container.appendChild(row);
    }

    function calculateInvoice() {
      let subtotal = 0;
      document.querySelectorAll('.item-row').forEach(row => {
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const rate = parseFloat(row.querySelector('.rate').value) || 0;
        const amt = qty * rate;
        row.querySelector('.amount').textContent = `₹${amt.toFixed(2)}`;
        subtotal += amt;
      });

      const gstRate = document.getElementById('gstRate').value === 'custom' 
        ? parseFloat(document.getElementById('customGst').value) || 0 
        : parseFloat(document.getElementById('gstRate').value);

      const discountVal = parseFloat(document.getElementById('discount').value) || 0;
      const discountType = document.getElementById('discountType').value;

      let discountAmt = discountType === 'percent' ? subtotal * (discountVal / 100) : discountVal;
      let taxable = subtotal - discountAmt;
      let gstAmt = taxable * (gstRate / 100);
      let grand = taxable + gstAmt;

      const roundOff = document.getElementById('roundOff').value;
      if (roundOff === 'nearest') grand = Math.round(grand);

      document.getElementById('subtotal').textContent = `₹${subtotal.toFixed(2)}`;
      document.getElementById('discountAmt').textContent = `- ₹${discountAmt.toFixed(2)}`;
      document.getElementById('taxable').textContent = `₹${taxable.toFixed(2)}`;
      document.getElementById('gstAmt').textContent = `+ ₹${gstAmt.toFixed(2)} (${gstRate}%)`;
      document.getElementById('grandTotal').textContent = `₹${grand.toFixed(2)}`;

      document.getElementById('invoiceResult').classList.remove('hidden');
    }

    // Show/hide custom GST input
    document.getElementById('gstRate').addEventListener('change', function() {
      document.getElementById('customGst').classList.toggle('hidden', this.value !== 'custom');
    });
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
