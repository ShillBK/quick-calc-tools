<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter – India 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Currency Converter</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-green-700">Convert Currency (March 2026 rates)</h2>

      <form id="currencyForm" class="space-y-6">
        <div>
          <label class="block text-lg font-medium mb-2">Amount</label>
          <input type="number" id="amount" value="1000" min="0.01" step="0.01" class="w-full p-4 border border-gray-300 rounded-lg text-2xl focus:ring-green-500 focus:border-green-500" required />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-lg font-medium mb-2">From</label>
            <select id="fromCurrency" class="w-full p-4 border border-gray-300 rounded-lg text-xl focus:ring-green-500 focus:border-green-500">
              <option value="INR">INR – Indian Rupee</option>
              <option value="USD">USD – US Dollar</option>
              <option value="EUR">EUR – Euro</option>
              <option value="GBP">GBP – British Pound</option>
              <option value="AED">AED – UAE Dirham</option>
              <option value="SAR">SAR – Saudi Riyal</option>
              <option value="SGD">SGD – Singapore Dollar</option>
              <option value="CAD">CAD – Canadian Dollar</option>
            </select>
          </div>

          <div>
            <label class="block text-lg font-medium mb-2">To</label>
            <select id="toCurrency" class="w-full p-4 border border-gray-300 rounded-lg text-xl focus:ring-green-500 focus:border-green-500">
              <option value="USD">USD – US Dollar</option>
              <option value="EUR">EUR – Euro</option>
              <option value="GBP">GBP – British Pound</option>
              <option value="INR" selected>INR – Indian Rupee</option>
              <option value="AED">AED – UAE Dirham</option>
              <option value="SAR">SAR – Saudi Riyal</option>
              <option value="SGD">SGD – Singapore Dollar</option>
              <option value="CAD">CAD – Canadian Dollar</option>
            </select>
          </div>
        </div>

        <button type="button" onclick="convertCurrency()" class="w-full bg-green-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-green-700 transition">
          Convert Now
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-green-50 border border-green-200 rounded-xl p-6">
        <h3 class="text-2xl font-bold text-green-800 mb-4">Conversion Result</h3>
        <p id="resultText" class="text-3xl font-semibold text-center"></p>
        <p id="rateInfo" class="text-lg mt-6 text-center text-gray-700"></p>
        <p class="text-sm text-gray-500 mt-4 text-center">
          Rates approximate – mid-March 2026 • For exact live rates use banking apps or xe.com
        </p>
      </div>
    </div>
  </main>

  <script>
    function convertCurrency() {
      const amount = parseFloat(document.getElementById('amount').value);
      const from = document.getElementById('fromCurrency').value;
      const to = document.getElementById('toCurrency').value;

      if (isNaN(amount) || amount <= 0) {
        alert("Please enter a valid amount");
        return;
      }

      if (from === to) {
        alert("Select different currencies");
        return;
      }

      // Approximate mid-March 2026 rates (INR base)
      const rates = {
        INR: 1,
        USD: 85.40,
        EUR: 91.20,
        GBP: 106.80,
        AED: 23.25,
        SAR: 22.77,
        SGD: 63.10,
        CAD: 62.50
      };

      const inrAmount = amount * rates[from];
      const result = inrAmount / rates[to];

      document.getElementById('resultText').textContent = 
        `${amount.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2})} ${from} = ` +
        `${result.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2})} ${to}`;

      document.getElementById('rateInfo').textContent = 
        `1 ${from} ≈ ${ (rates[from] / rates[to]).toFixed(4) } ${to} (approx.)`;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
