<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Strength Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Password Strength Checker</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-gray-700">Test Your Password Strength</h2>

      <form id="passForm" class="space-y-6">
        <div>
          <label class="block text-lg font-medium mb-2">Enter Password</label>
          <div class="relative">
            <input type="password" id="password" class="w-full p-4 border border-gray-300 rounded-lg text-xl focus:ring-gray-500 focus:border-gray-500" required />
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500">Show</button>
          </div>
        </div>

        <button type="button" onclick="checkPassword()" class="w-full bg-gray-700 text-white py-4 rounded-lg text-xl font-bold hover:bg-gray-800 transition">
          Check Strength
        </button>
      </form>

      <div id="result" class="mt-10 hidden rounded-xl p-6" style="background-color: #f3f4f6; border: 1px solid #d1d5db;">
        <h3 class="text-2xl font-bold mb-4 text-center" id="strengthLabel"></h3>
        <div class="w-full bg-gray-200 rounded-full h-4 mb-4">
          <div id="strengthBar" class="h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
        <ul class="space-y-2 text-lg" id="checks"></ul>
      </div>
    </div>
  </main>

  <script>
    function togglePassword() {
      const pass = document.getElementById('password');
      const btn = pass.nextElementSibling;
      if (pass.type === 'password') {
        pass.type = 'text';
        btn.textContent = 'Hide';
      } else {
        pass.type = 'password';
        btn.textContent = 'Show';
      }
    }

    function checkPassword() {
      const pass = document.getElementById('password').value;
      const resultDiv = document.getElementById('result');
      const label = document.getElementById('strengthLabel');
      const bar = document.getElementById('strengthBar');
      const checksList = document.getElementById('checks');

      if (!pass) {
        alert("Please enter a password");
        return;
      }

      let score = 0;
      const checks = [];

      if (pass.length >= 12) {
        score += 30;
        checks.push("Length ≥ 12 characters ✓");
      } else if (pass.length >= 8) {
        score += 15;
        checks.push("Length ≥ 8 characters ✓");
      } else {
        checks.push("Length too short ✗ (aim for 12+)");
      }

      if (/[A-Z]/.test(pass)) {
        score += 15;
        checks.push("Has uppercase letter ✓");
      } else {
        checks.push("No uppercase letter ✗");
      }

      if (/[a-z]/.test(pass)) {
        score += 15;
        checks.push("Has lowercase letter ✓");
      } else {
        checks.push("No lowercase letter ✗");
      }

      if (/\d/.test(pass)) {
        score += 15;
        checks.push("Has number ✓");
      } else {
        checks.push("No number ✗");
      }

      if (/[^A-Za-z0-9]/.test(pass)) {
        score += 20;
        checks.push("Has special character ✓");
      } else {
        checks.push("No special character ✗");
      }

      if (pass.length > 20) score += 5;

      let strength = "Weak";
      let color = "bg-red-600";
      if (score >= 80) {
        strength = "Very Strong";
        color = "bg-green-600";
      } else if (score >= 60) {
        strength = "Strong";
        color = "bg-emerald-500";
      } else if (score >= 40) {
        strength = "Medium";
        color = "bg-yellow-500";
      }

      label.textContent = `${strength} (${score}/100)`;
      label.className = `text-3xl font-bold text-center ${strength.includes('Strong') ? 'text-green-700' : strength === 'Medium' ? 'text-yellow-700' : 'text-red-700'}`;
      bar.className = `h-4 rounded-full ${color}`;
      bar.style.width = `${score}%`;

      checksList.innerHTML = checks.map(c => `<li class="text-lg">${c}</li>`).join('');

      resultDiv.classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
