<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Age Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Age Calculator</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-cyan-700">Calculate Your Exact Age</h2>

      <form id="ageForm" class="space-y-6">
        <div>
          <label class="block text-lg font-medium mb-2">Date of Birth</label>
          <input type="date" id="birthDate" class="w-full p-4 border border-gray-300 rounded-lg text-xl focus:ring-cyan-500 focus:border-cyan-500" required />
        </div>

        <button type="button" onclick="calculateAge()" class="w-full bg-cyan-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-cyan-700 transition">
          Calculate Age
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-cyan-50 border border-cyan-200 rounded-xl p-8 text-center">
        <h3 class="text-4xl font-extrabold text-cyan-700 mb-6" id="ageDisplay"></h3>
        <p class="text-xl text-gray-800" id="detail"></p>
      </div>
    </div>
  </main>

  <script>
    function calculateAge() {
      const birth = new Date(document.getElementById('birthDate').value);
      const today = new Date();

      if (isNaN(birth.getTime())) {
        alert("Please select a valid date");
        return;
      }

      let years = today.getFullYear() - birth.getFullYear();
      let months = today.getMonth() - birth.getMonth();
      let days = today.getDate() - birth.getDate();

      if (days < 0) {
        months--;
        days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      document.getElementById('ageDisplay').textContent = `${years} years, ${months} months, ${days} days`;
      document.getElementById('detail').textContent = `Born on ${birth.toDateString()} • Today is ${today.toDateString()}`;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
