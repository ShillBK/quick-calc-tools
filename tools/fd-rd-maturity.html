<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FD / RD Maturity Calculator – India 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">FD / RD Maturity Calculator</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-green-700">FD or RD Maturity & Interest</h2>

      <form id="fdForm" class="space-y-6">
        <div class="flex items-center space-x-4">
          <label class="text-lg font-medium">Type:</label>
          <label><input type="radio" name="type" value="fd" checked class="mr-2"> FD</label>
          <label><input type="radio" name="type" value="rd" class="mr-2"> RD</label>
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Principal Amount (₹)</label>
          <input type="number" id="principal" value="100000" min="1000" step="1000" class="w-full p-3 border border-gray-300 rounded-lg" required />
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Interest Rate (%) p.a.</label>
          <input type="number" id="rate" value="7.25" min="1" step="0.01" class="w-full p-3 border border-gray-300 rounded-lg" required />
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Tenure (months)</label>
          <input type="number" id="tenure" value="12" min="1" step="1" class="w-full p-3 border border-gray-300 rounded-lg" required />
        </div>

        <div id="rdExtra" class="hidden">
          <label class="block text-lg font-medium mb-2">Monthly Deposit (₹) – for RD only</label>
          <input type="number" id="monthly" value="5000" min="100" step="100" class="w-full p-3 border border-gray-300 rounded-lg" />
        </div>

        <button type="button" onclick="calculateFD_RD()" class="w-full bg-green-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-green-700 transition">
          Calculate Maturity
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-green-50 border border-green-200 rounded-xl p-6">
        <h3 class="text-2xl font-bold text-green-800 mb-4">Results</h3>
        <p id="maturity" class="text-xl mb-3"></p>
        <p id="interest" class="text-xl"></p>
      </div>
    </div>
  </main>

  <script>
    // Toggle monthly field for RD
    document.querySelectorAll('input[name="type"]').forEach(radio => {
      radio.addEventListener('change', function() {
        document.getElementById('rdExtra').classList.toggle('hidden', this.value !== 'rd');
      });
    });

    function calculateFD_RD() {
      const type = document.querySelector('input[name="type"]:checked').value;
      const principal = parseFloat(document.getElementById('principal').value);
      const rate = parseFloat(document.getElementById('rate').value) / 100 / 12; // monthly rate
      const tenure = parseFloat(document.getElementById('tenure').value);

      if (isNaN(principal) || isNaN(rate) || isNaN(tenure) || principal <= 0 || tenure <= 0) {
        alert("Please enter valid values");
        return;
      }

      let maturity, interest;

      if (type === 'fd') {
        // Simple FD: P × (1 + r × t)
        const totalInterest = principal * rate * tenure;
        maturity = principal + totalInterest;
        interest = totalInterest;
      } else {
        // RD approximation (quarterly compounding common in India)
        const monthly = parseFloat(document.getElementById('monthly').value);
        if (isNaN(monthly) || monthly <= 0) {
          alert("Enter valid monthly deposit for RD");
          return;
        }
        maturity = 0;
        for (let i = 1; i <= tenure; i++) {
          const monthsLeft = tenure - i + 1;
          maturity += monthly * Math.pow(1 + rate, monthsLeft);
        }
        interest = maturity - (monthly * tenure);
      }

      document.getElementById('maturity').innerHTML = `<strong>Maturity Amount:</strong> ₹${Math.round(maturity).toLocaleString('en-IN')}`;
      document.getElementById('interest').innerHTML = `<strong>Interest Earned:</strong> ₹${Math.round(interest).toLocaleString('en-IN')}`;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
