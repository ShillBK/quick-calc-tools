<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Name Meaning & Numerology Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Name Meaning Analyzer</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-indigo-600">✨ Discover Your Name's Meaning & Energy</h2>

      <form id="nameForm" class="space-y-6">
        <div>
          <label class="block text-lg font-medium mb-2">Full Name or First Name</label>
          <input type="text" id="name" value="Shilpa" class="w-full p-4 border border-gray-300 rounded-lg text-xl focus:ring-indigo-500 focus:border-indigo-500" required />
        </div>

        <button type="button" onclick="analyzeName()" class="w-full bg-indigo-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-indigo-700 transition">
          Analyze Name
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-indigo-50 border border-indigo-200 rounded-xl p-8">
        <h3 class="text-3xl font-bold text-indigo-700 mb-6 text-center" id="nameTitle"></h3>
        <p class="text-xl mb-4" id="meaningText"></p>
        <p class="text-lg mb-4" id="numberText"></p>
        <p class="text-base text-gray-700 leading-relaxed" id="vibeText"></p>
      </div>
    </div>
  </main>

  <script>
    function analyzeName() {
      let name = document.getElementById('name').value.trim();
      if (!name) {
        alert("Please enter a name");
        return;
      }

      name = name.toLowerCase().replace(/\s+/g, '');

      // Simple numerology: sum of letter positions (A=1, B=2...)
      let sum = 0;
      for (let char of name) {
        if (/[a-z]/.test(char)) {
          sum += char.charCodeAt(0) - 96;
        }
      }

      const number = sum % 9 || 9; // 1-9

      // Sample meanings dictionary (expand as you like)
      const meanings = {
        "shilpa": {mean:"Artistic, shaped by skill", vibe:"Creative, graceful, detail-oriented. You bring beauty and structure to life."},
        "rahul": {mean:"Efficient, conqueror of all miseries", vibe:"Intelligent, charismatic, goal-driven. Natural leader energy."},
        // Add more common names...
        default: {mean:"Unique personal vibration", vibe:"Your name carries your own special energy – strong, one-of-a-kind personality."}
      };

      const info = meanings[name] || meanings.default;

      document.getElementById('nameTitle').textContent = name.charAt(0).toUpperCase() + name.slice(1);
      document.getElementById('meaningText').innerHTML = `<strong>Meaning / Origin vibe:</strong> ${info.mean}`;
      document.getElementById('numberText').innerHTML = `<strong>Numerology number:</strong> ${number} (Soul Urge / Expression energy)`;
      document.getElementById('vibeText').textContent = info.vibe;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
