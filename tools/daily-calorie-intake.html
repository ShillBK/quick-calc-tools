<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Calorie Intake Calculator (TDEE)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Daily Calorie Intake (TDEE)</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-purple-700">Estimate Your Daily Calorie Needs</h2>

      <form id="calorieForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-lg font-medium mb-2">Gender</label>
            <select id="gender" class="w-full p-3 border border-gray-300 rounded-lg">
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>

          <div>
            <label class="block text-lg font-medium mb-2">Age (years)</label>
            <input type="number" id="age" value="30" min="18" max="80" class="w-full p-3 border border-gray-300 rounded-lg" required />
          </div>

          <div>
            <label class="block text-lg font-medium mb-2">Weight (kg)</label>
            <input type="number" id="weight" value="70" min="30" step="0.5" class="w-full p-3 border border-gray-300 rounded-lg" required />
          </div>

          <div>
            <label class="block text-lg font-medium mb-2">Height (cm)</label>
            <input type="number" id="height" value="170" min="100" step="1" class="w-full p-3 border border-gray-300 rounded-lg" required />
          </div>
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Activity Level (Bengaluru lifestyle)</label>
          <select id="activity" class="w-full p-3 border border-gray-300 rounded-lg">
            <option value="1.2">Sedentary (desk job, little exercise)</option>
            <option value="1.375">Lightly active (walk/cycle 1–3 days/week)</option>
            <option value="1.55" selected>Moderately active (gym/workout 3–5 days/week)</option>
            <option value="1.725">Very active (intense exercise 6–7 days/week)</option>
            <option value="1.9">Super active (physical job + hard training)</option>
          </select>
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Goal</label>
          <select id="goal" class="w-full p-3 border border-gray-300 rounded-lg">
            <option value="0">Maintain current weight</option>
            <option value="-500">Lose weight (~0.5 kg/week)</option>
            <option value="500">Gain weight (~0.5 kg/week)</option>
          </select>
        </div>

        <button type="button" onclick="calculateCalories()" class="w-full bg-purple-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-purple-700 transition">
          Calculate Daily Calories
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-purple-50 border border-purple-200 rounded-xl p-6">
        <h3 class="text-2xl font-bold text-purple-800 mb-4">Your Estimated Daily Needs</h3>
        <p id="bmr" class="text-xl mb-3"></p>
        <p id="tdee" class="text-2xl font-bold mb-3"></p>
        <p id="goalCalories" class="text-xl"></p>
        <p class="mt-4 text-sm text-gray-600">Tip: In Bengaluru’s warm climate, add ~300–500 ml extra water daily.</p>
      </div>
    </div>
  </main>

  <script>
    function calculateCalories() {
      const gender = document.getElementById('gender').value;
      const age = parseFloat(document.getElementById('age').value);
      const weight = parseFloat(document.getElementById('weight').value);
      const height = parseFloat(document.getElementById('height').value);
      const activity = parseFloat(document.getElementById('activity').value);
      const goal = parseFloat(document.getElementById('goal').value);

      if ([age, weight, height, activity, goal].some(isNaN)) {
        alert("Please fill all fields correctly");
        return;
      }

      // Mifflin-St Jeor BMR
      let bmr;
      if (gender === 'male') {
        bmr = 10 * weight + 6.25 * height - 5 * age + 5;
      } else {
        bmr = 10 * weight + 6.25 * height - 5 * age - 161;
      }

      const tdee = Math.round(bmr * activity);
      const goalCalories = tdee + goal;

      document.getElementById('bmr').innerHTML = `<strong>BMR (resting calories):</strong> ${Math.round(bmr)} kcal/day`;
      document.getElementById('tdee').innerHTML = `<strong>Maintenance Calories (TDEE):</strong> ${tdee} kcal/day`;
      document.getElementById('goalCalories').innerHTML = goal === 0 
        ? `<strong>To maintain weight:</strong> ~${tdee} kcal/day`
        : goal < 0 
          ? `<strong>To lose ~0.5 kg/week:</strong> ~${goalCalories} kcal/day`
          : `<strong>To gain ~0.5 kg/week:</strong> ~${goalCalories} kcal/day`;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>
</body>
</html>
