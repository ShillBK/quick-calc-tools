<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fuel Cost Calculator – Bengaluru March 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="../index.html" class="text-indigo-600 font-semibold hover:underline">← Back to CalcHub</a>
      <h1 class="text-xl font-bold text-gray-800">Fuel Cost Calculator</h1>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-3xl font-bold text-center mb-8 text-red-700">Estimate Your Trip Fuel Cost</h2>

      <form id="fuelForm" class="space-y-6">
        <div>
          <label class="block text-lg font-medium mb-2">Distance (km)</label>
          <input type="number" id="distance" value="50" min="1" step="any" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" required />
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Mileage (km/L or km/kg for CNG)</label>
          <input type="number" id="mileage" value="18" min="1" step="0.1" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" required />
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Fuel Type</label>
          <select id="fuelType" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            <option value="petrol">Petrol (~₹102.55 / L)</option>
            <option value="diesel">Diesel (~₹90.99 / L)</option>
            <option value="cng">CNG (~₹90.10 / kg)</option>
          </select>
        </div>

        <div>
          <label class="block text-lg font-medium mb-2">Price (override if needed, ₹/L or ₹/kg)</label>
          <input type="number" id="price" step="0.01" placeholder="Leave blank for default" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" />
        </div>

        <div class="flex items-center">
          <input type="checkbox" id="roundTrip" class="h-5 w-5 text-indigo-600" />
          <label for="roundTrip" class="ml-3 text-lg">Round trip (×2 distance)</label>
        </div>

        <button type="button" onclick="calculateFuel()" class="w-full bg-indigo-600 text-white py-4 rounded-lg text-xl font-semibold hover:bg-indigo-700 transition">
          Calculate
        </button>
      </form>

      <div id="result" class="mt-10 hidden bg-green-50 border border-green-200 rounded-xl p-6">
        <h3 class="text-2xl font-bold text-green-800 mb-4">Results</h3>
        <p id="fuelNeeded" class="text-xl mb-2"></p>
        <p id="totalCost" class="text-xl mb-2"></p>
        <p id="costPerKm" class="text-xl"></p>
      </div>
    </div>
  </main>

  <script>
    function calculateFuel() {
      const distance = parseFloat(document.getElementById('distance').value);
      const mileage = parseFloat(document.getElementById('mileage').value);
      let price = parseFloat(document.getElementById('price').value);
      const fuelType = document.getElementById('fuelType').value;
      const roundTrip = document.getElementById('roundTrip').checked;

      if (isNaN(distance) || isNaN(mileage) || mileage <= 0) {
        alert("Please enter valid distance and mileage.");
        return;
      }

      const finalDistance = roundTrip ? distance * 2 : distance;

      // Defaults as of March 12, 2026 Bengaluru
      if (isNaN(price) || price <= 0) {
        if (fuelType === 'petrol') price = 102.55;
        else if (fuelType === 'diesel') price = 90.99;
        else if (fuelType === 'cng') price = 90.10;
      }

      const needed = finalDistance / mileage;
      const cost = needed * price;
      const perKm = cost / finalDistance;

      const unit = fuelType === 'cng' ? 'kg' : 'L';

      document.getElementById('fuelNeeded').innerHTML = `<strong>Fuel needed:</strong> ${needed.toFixed(2)} ${unit}`;
      document.getElementById('totalCost').innerHTML = `<strong>Total cost:</strong> ₹${Math.round(cost)}`;
      document.getElementById('costPerKm').innerHTML = `<strong>Cost per km:</strong> ₹${perKm.toFixed(2)}`;

      document.getElementById('result').classList.remove('hidden');
    }
  </script>

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>CalcHub • Free Tools • Bengaluru 2026</p>
  </footer>

</body>
</html>
